server:
  port: 8082

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/eolma_product
    username: eolma
    password: eolma-local
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: product-service

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    com.eolma.product: DEBUG
    org.hibernate.SQL: DEBUG
